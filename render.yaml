services:
  - type: web
    name: findora-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://findora.vercel.app
      - key: PORT
        value: 10000
    disk:
      name: findora-data
      mountPath: /data
      sizeGB: 1